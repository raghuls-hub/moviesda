      #   r23b → clang-14: unsupported option '-print-multi-os-directory'
      #   r25b → libthorvg recipe IndexError: list index out of range
      #   r21e → no known issues with any p4a recipe
      # Downloaded manually because sdkmanager no longer lists r21e.
      - name: Install NDK r21e
