name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── System dependencies ───────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip python3-venv \
            autoconf automake libtool \
            pkg-config cmake ninja-build \
            libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libltdl-dev libpython3-dev patchelf \
            build-essential ccache \
            lld

      # ── Python packages ───────────────────────────────────────────────────
      # cython 0.29.x is required — Kivy 2.x recipes break on cython 3.x
      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      # ── Buildozer cache ───────────────────────────────────────────────────
      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── Android SDK + NDK ─────────────────────────────────────────────────
      # NDK r23b (23.2.8568313) is used instead of r25b to avoid the
      # libthorvg recipe IndexError bug present in p4a with NDK r25b.
      - name: Install Android SDK cmdline-tools, licenses, SDK components and NDK
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/cmdline-tools"

          # Download and place cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
          mv /tmp/cmdline-tools-extract/cmdline-tools "$SDK/cmdline-tools/latest"

          # Shim for buildozer's hardcoded tools/bin/sdkmanager path
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDK/cmdline-tools/latest/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"

          export PATH="$SDK/cmdline-tools/latest/bin:$SDK/tools/bin:$PATH"

          # Accept all licenses non-interactively
          yes | sdkmanager --sdk_root="$SDK" --licenses || true

          # Pre-install all required SDK + NDK components
          yes | sdkmanager --sdk_root="$SDK" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools" \
            "ndk;23.2.8568313" || true

      # ── License hash files fallback ───────────────────────────────────────
      - name: Write Android SDK license hash files
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e" \
            > "$SDK/licenses/android-sdk-license"
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd" \
            > "$SDK/licenses/android-sdk-preview-license"
          printf "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" \
            > "$SDK/licenses/google-gdk-license"
          printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" \
            > "$SDK/licenses/intel-android-extra-license"
          printf "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" \
            > "$SDK/licenses/mips-android-sysimage-license"

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build APK
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          NDK="$HOME/.buildozer/android/platform/android-ndk-r23b"

          export PATH="$SDK/cmdline-tools/latest/bin:$SDK/tools/bin:$SDK/platform-tools:$PATH"

          # Tell p4a / buildozer exactly where the NDK lives
          export ANDROID_NDK_HOME="$NDK"
          export ANDROIDNDK="$NDK"
          export ANDROID_NDK="$NDK"
          export ANDROID_NDK_ROOT="$NDK"

          # Unset the runner's pre-installed NDK env vars so they don't interfere
          unset ANDROID_NDK_LATEST_HOME

          buildozer -v android debug 2>&1 | tee build.log

      # ── Upload APK ────────────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: moviesda-debug-apk
          path: bin/*.apk

      # ── Upload logs on failure ────────────────────────────────────────────
      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: |
            build.log
            .buildozer/android/platform/build-*/dists/*/build.log
