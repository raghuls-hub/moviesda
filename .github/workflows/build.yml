name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip python3-venv \
            autoconf automake libtool \
            pkg-config cmake ninja-build \
            libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libltdl-dev \
            build-essential ccache

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.11

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install Android SDK cmdline-tools and accept licenses
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
          mv /tmp/cmdline-tools-extract/cmdline-tools "$SDK/cmdline-tools/latest"
          # Buildozer hardcodes tools/bin/sdkmanager — create a shim at that path
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDK/cmdline-tools/latest/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"
          export PATH="$SDK/cmdline-tools/latest/bin:$SDK/tools/bin:$PATH"
          # Accept all licenses non-interactively
          yes | sdkmanager --sdk_root="$SDK" --licenses || true
          # Pre-install required SDK components so buildozer doesn't prompt
          yes | sdkmanager --sdk_root="$SDK" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "platform-tools" || true

      - name: Accept Android SDK licenses (hash files fallback)
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          printf "\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e" > "$SDK/licenses/android-sdk-license"
          printf "\n84831b9409646a918e30573bab4c9c91346d8abd" > "$SDK/licenses/android-sdk-preview-license"
          printf "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$SDK/licenses/google-gdk-license"
          printf "\nd975f751698a77b662f1254ddbeed3901e976f5a" > "$SDK/licenses/intel-android-extra-license"
          printf "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" > "$SDK/licenses/mips-android-sysimage-license"

      - name: Build APK
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          export PATH="$SDK/cmdline-tools/latest/bin:$SDK/tools/bin:$SDK/platform-tools:$PATH"
          buildozer -v android debug 2>&1 | tee build.log

      - name: Retry with license re-acceptance on failure
        if: failure()
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          export PATH="$SDK/cmdline-tools/latest/bin:$SDK/tools/bin:$SDK/platform-tools:$PATH"
          yes | sdkmanager --sdk_root="$SDK" --licenses || true
          buildozer -v android debug 2>&1 | tee build_retry.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moviesda-debug-apk
          path: bin/*.apk

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: |
            build.log
            build_retry.log
            .buildozer/android/platform/build-*/dists/*/build.log
