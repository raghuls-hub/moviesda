name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_android:
        description: "Run Android build job"
        required: false
        default: "false"

jobs:
  checks:
    name: Lint & Quick Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}

      - name: Install minimal tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools wheel

      - name: Install minimal runtime dependencies
        run: |
          # Install non-GUI runtime deps used by the app so import smoke-test succeeds
          python -m pip install requests beautifulsoup4 plyer

      - name: Quick compile check
        env:
          PYTHONPATH: src
        run: |
          python -m compileall -q src main.py

      - name: Optional import smoke-test
        if: success()
        env:
          PYTHONPATH: src
        run: |
          python .github/ci/import_smoke_test.py

  android-build:
    name: Android build (manual)
    needs: checks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_android == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip wget curl python3-venv python3-pip build-essential ccache lld openjdk-17-jdk-headless

      - name: Install buildozer and pinned Cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer==1.5.0 cython==0.29.37

      - name: Cache buildozer dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-ndk21e-${{ hashFiles('buildozer.spec') }}

      - name: Install Android SDK cmdline-tools
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/cmdline-tools"
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-extract
          mv /tmp/cmdline-tools-extract/cmdline-tools "$SDK/cmdline-tools/latest"
          mkdir -p "$SDK/tools/bin"
          ln -sf "$SDK/cmdline-tools/latest/bin/sdkmanager" "$SDK/tools/bin/sdkmanager"
          export PATH="$SDK/cmdline-tools/latest/bin:$SDK/tools/bin:$PATH"
          yes | sdkmanager --sdk_root="$SDK" --licenses || true
          yes | sdkmanager --sdk_root="$SDK" "platforms;android-33" "build-tools;33.0.2" "platform-tools" || true

      - name: Install NDK r21e (cached)
        run: |
          NDK_DIR="$HOME/.buildozer/android/platform/android-ndk-r21e"
          if [ ! -d "$NDK_DIR" ]; then
            wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip -O /tmp/android-ndk-r21e.zip
            unzip -q /tmp/android-ndk-r21e.zip -d "$HOME/.buildozer/android/platform/"
          fi

      - name: Build APK
        env:
          ANDROID_NDK_HOME: $HOME/.buildozer/android/platform/android-ndk-r21e
        run: |
          export PATH="$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:$PATH"
          unset ANDROID_NDK_HOME || true
          export ANDROID_NDK_HOME="$HOME/.buildozer/android/platform/android-ndk-r21e"
          buildozer -v android debug 2>&1 | tee build.log

      - name: Collect APK
        if: success()
        run: |
          mkdir -p output_apk
          find . -name "*.apk" -print0 | xargs -0 -I{} cp {} output_apk/ || true
          ls -lh output_apk || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: output_apk
