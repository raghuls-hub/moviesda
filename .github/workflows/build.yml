            wget -q \
              https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip \
              -O /tmp/android-ndk-r21e.zip
            unzip -q /tmp/android-ndk-r21e.zip \
              -d "$HOME/.buildozer/android/platform/"
            echo "NDK r21e installed at $NDK_DIR"
