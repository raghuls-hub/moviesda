name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            python3-pip python3-venv \
            autoconf automake libtool \
            pkg-config cmake ninja-build \
            libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libltdl-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            build-essential ccache

      - name: Install buildozer and cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.11

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          # Accept all standard Android SDK licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "504667f4c0de7af1a06de9f4b1727b84351f2910" > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
          echo "e9acab5b5fbb560a72cfaecce8946896ff6aab9d" > ~/.buildozer/android/platform/android-sdk/licenses/mips-android-sysimage-license

      - name: Build APK
        run: |
          # Accept licenses via sdkmanager if SDK is already installed
          if [ -f ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager ]; then
            yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true
          fi
          buildozer -v android debug 2>&1 | tee build.log

      - name: Accept licenses mid-build if SDK installed
        if: failure()
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          if [ -f "$SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          fi
          buildozer -v android debug 2>&1 | tee build_retry.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: moviesda-debug-apk
          path: bin/*.apk

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: |
            build.log
            build_retry.log
            .buildozer/android/platform/build-*/dists/*/build.log
