name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with official Buildozer image
        run: |
          docker pull ghcr.io/kivy/buildozer:latest
          docker run --rm \
            --volume "${{ github.workspace }}:/home/user/hostcwd" \
            --volume "${{ github.workspace }}/.buildozer:/home/user/.buildozer" \
            --workdir /home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moviesda-android-apk
          path: bin/*.apk
