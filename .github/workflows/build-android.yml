name: Build Android APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            cmake \
            git \
            libffi-dev \
            libltdl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            libtool \
            libtinfo5 \
            openjdk-17-jdk \
            patch \
            pkg-config \
            python3-venv \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel "Cython<3.0" buildozer

      - name: Build Android APK
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moviesda-android-apk
          path: bin/*.apk
